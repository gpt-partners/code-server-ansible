---
- name: Install code-server plain vanilla
  hosts: code_server
  become: true

  vars:
    code_server_user: root
    code_server_password: "CHANGE_ME_STRONG_PASSWORD"
    code_server_port: 8088
    code_server_bind_addr: "127.0.0.1"

  tasks:
    # ----- Code-Server -----
    - name: Install basic dependencies
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
        state: present
        update_cache: true

    - name: Download official code-server install script
      ansible.builtin.get_url:
        url: https://code-server.dev/install.sh
        dest: /tmp/code-server-install.sh
        mode: "0755"

    - name: Install code-server
      ansible.builtin.command: /tmp/code-server-install.sh
      args:
        creates: /usr/bin/code-server

    - name: Create code-server config directory
      ansible.builtin.file:
        path: "/{{ code_server_user }}/.config/code-server"
        state: directory
        owner: "{{ code_server_user }}"
        group: "{{ code_server_user }}"
        mode: "0700"

    - name: Write code-server config
      ansible.builtin.copy:
        dest: "/{{ code_server_user }}/.config/code-server/config.yaml"
        owner: "{{ code_server_user }}"
        group: "{{ code_server_user }}"
        mode: "0600"
        content: |
          bind-addr: {{ code_server_bind_addr }}:{{ code_server_port }}
          auth: password
          password: {{ code_server_password }}
          cert: false

    - name: Enable and start code-server user service
      ansible.builtin.systemd:
        name: "code-server@{{ code_server_user }}"
        enabled: true
        state: restarted

    # ----- CADDY -----

    - name: Install Caddy dependencies
      ansible.builtin.apt:
        name:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
          - curl
        state: present
        update_cache: true

    - name: Download Caddy GPG key
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        dest: /tmp/caddy.gpg

    - name: Convert GPG key to keyring format
      ansible.builtin.command: >
        gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg /tmp/caddy.gpg
      args:
        creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

    - name: Download Caddy repo file
      ansible.builtin.get_url:
        url: https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt
        dest: /etc/apt/sources.list.d/caddy-stable.list
        mode: "0644"

    - name: Ensure correct permissions for keyring
      ansible.builtin.file:
        path: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
        mode: "0644"

    - name: Ensure correct permissions for repo list
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/caddy-stable.list
        mode: "0644"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present

    - name: Configure Caddy reverse proxy
      ansible.builtin.copy:
        dest: /etc/caddy/Caddyfile
        content: |
          {{ domain_name }} {
              reverse_proxy localhost:{{ code_server_port }}
          }

    - name: Restart Caddy
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: restarted
